name: Pre-release application with the JRE using jpackage

on: workflow_dispatch

jobs:
  pre-release-with-jre-included:
    # Only on Windows for the moment
    runs-on: windows-latest
    name: Pre-release application with JRE included

    steps:
    - name: Checkout ${{ github.event.repository.name }}
      uses: actions/checkout@v4

    - name: Download artifact from other workflow
      uses: dawidd6/action-download-artifact@v9
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        workflow: Pre-Release-and-Prepare-Next-Dev.yml
        workflow_conclusion: success
        path: ${{ github.workspace }}\artifacts

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Checkout distribution to get icons
      uses: actions/checkout@v4
      with:
        repository: riseclipse/riseclipse-distribution
        path: riseclipse-distribution

    - name: Package application
      run: |
        mv ${{ github.workspace }}\artifacts\*\*Application*.jar .
        jpackage --input . `
                 --main-jar *.jar `
                 --main-class fr.centralesupelec.edf.riseclipse.iec61850.scl.validator.ui.application.RiseClipseValidatorSCLApplication `
                 --type exe `
                 --name RiseClipseValidatorSCLApplication-1.2.9rc.exe `
                 --copyright "Copyright (c) 2025 CentraleSupélec & EDF" `
                 --app-version 1.2.9 `
                 --icon ${{ github.workspace }}\riseclipse-distribution\fr.centralesupelec.edf.riseclipse.rcp\icons\riseclipse.ico

    - name: Package cli
      run: |
        mv ${{ github.workspace }}\artifacts\*\*.jar .
        jpackage --input . `
                 --main-jar *.jar `
                 --main-class fr.centralesupelec.edf.riseclipse.iec61850.scl.validator.RiseClipseValidatorSCL `
                 --type exe `
                 --name RiseClipseValidatorSCL-1.2.9rc.exe `
                 --win-console `
                 --copyright "Copyright (c) 2025 CentraleSupélec & EDF" `
                 --app-version 1.2.9 `
                 --icon ${{ github.workspace }}\riseclipse-distribution\fr.centralesupelec.edf.riseclipse.rcp\icons\riseclipse.ico

    - name: Release exe
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: "${{ github.workspace }}/*.exe"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.event.repository.name }}-1.2.9
        prerelease: true
        name: ${{ github.event.repository.name }} v1.2.9

